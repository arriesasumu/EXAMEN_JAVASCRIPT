<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Hiragana</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header>
        <h1>Adivina el Hiragana</h1>
    </header>

    <main>
        <section class="seccion-juego">
            <p class="image-counter">Imagen<span id="image-number">1</span> de 10 (10 aleatorias)</p>
            <div class="image-container">
                <img src="assets/a.jpg" alt="Hiragana" id="hiragana-image" height="200" width="200">
            </div>
            <div class="input-group">
                <input type="text" id="answer-input" placeholder="Escribe el nombre de la imagen actual" maxlength="20">
                <button id="check-btn" class="btn btn-primary">Comprobar</button>
                <button id="reset-btn" class="btn btn-danger">Resetear</button>
            </div>
        </section>

        <section class="seccion-resumen">
            <h2>Resumen</h2>
            <div class="contar-sumarios">
                <div class="sumar-aciertos">
                    <h3>Aciertos</h3>
                    <p id="contar-aciertos">0</p>
                </div>
                <div class="contar-sumarios">
                    <h3>Fallos</h3>
                    <p id="contar-fallos">0</p>
                </div>
                <div class="contar-sumarios">
                    <h3>Intentos</h3>
                    <p id="contar-intentos">0</p>
                </div>
                <div class="contar-sumarios">
                    <h3>Pendientes</h3>
                    <p id="contar-pendientes">10</p>
                </div>
            </div>
        </section>

        <section class="seccion-historial">
            <h2>Historial de respuestas</h2>
            <table class="historial-tabla">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Respuesta escrita</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody id="contenedor-historial">
                    <tr>
                        <td colspan="3" class="empty-message">Todavía no hay respuestas registradas.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="js/datos.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
